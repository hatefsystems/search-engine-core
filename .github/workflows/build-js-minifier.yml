name: 🗜️ Build JS Minifier

on:
  workflow_call:
    inputs:
      docker_image:
        required: true
        type: string
      docker_tag:
        required: true
        type: string
      cache_version:
        required: false
        type: string
        default: '1'

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  build-js-minifier:
    name: 🗜️ Build JS Minifier
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build JS Minifier Service Image
      uses: docker/build-push-action@v7
      with:
        context: ./js-minifier-service
        file: ./js-minifier-service/Dockerfile
        tags: ${{ inputs.docker_image }}:${{ inputs.docker_tag }}
        load: true
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

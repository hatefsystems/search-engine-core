name: 🗄️ Build MongoDB Drivers

on:
  workflow_call:
    inputs:
      docker_image:
        required: true
        type: string
      docker_tag:
        required: true
        type: string

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  build-drivers:
    name: 🗄️ Build MongoDB Drivers
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build MongoDB Drivers Image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./docker/Dockerfile.mongodb
        push: true
        tags: ${{ inputs.docker_image }}:${{ inputs.docker_tag }}
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
